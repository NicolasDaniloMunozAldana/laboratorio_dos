<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIRA - Registro</title>
    <link rel="stylesheet" href="./styles/login.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>SIRA</h1>   
            <p>Registro de Usuario</p>
        </div>
        
        <form class="login-form" id="registerForm">
            <div id="alertContainer"></div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                Registrando usuario...
            </div>
            
            <div class="form-group">
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="Ingrese su nombre de usuario">
            </div>
            
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email" placeholder="Ingrese su email">
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Ingrese su contraseña">
                <small style="color: #666; font-size: 0.85rem; margin-top: 4px; display: block;">
                    Mínimo 6 caracteres, debe contener al menos una letra y un número
                </small>
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirmar Contraseña</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" placeholder="Confirme su contraseña">
            </div>
            
            <button type="submit" class="login-btn" id="registerBtn">
                Registrarse
            </button>
            
            <div class="forgot-password">
                <a href="/" onclick="goToLogin()">¿Ya tienes cuenta? Iniciar Sesión</a>
            </div>
        </form>

    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const loading = document.getElementById('loading');

        function showAlert(message, type = 'error') {
            let icon = 'error';
            if (type === 'success') icon = 'success';
            else if (type === 'warning') icon = 'warning';
            Swal.fire({
                text: message,
                icon: icon,
                confirmButtonColor: icon === 'success' ? '#2563eb' : (icon === 'warning' ? '#fb8500' : '#d90429'),
                timer: 4000,
                timerProgressBar: true,
                showConfirmButton: true
            });
        }

        function setLoading(isLoading) {
            if (isLoading) {
                loading.style.display = 'block';
                registerBtn.disabled = true;
                registerBtn.textContent = 'Registrando...';
            } else {
                loading.style.display = 'none';
                registerBtn.disabled = false;
                registerBtn.textContent = 'Registrarse';
            }
        }

        function validatePassword(password) {
            if (password.length < 6) {
                return 'La contraseña debe tener al menos 6 caracteres';
            }
            if (!/[a-zA-Z]/.test(password)) {
                return 'La contraseña debe contener al menos una letra';
            }
            if (!/\d/.test(password)) {
                return 'La contraseña debe contener al menos un número';
            }
            return null;
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Validaciones del lado del cliente
            if (!username || !email || !password || !confirmPassword) {
                showAlert('Por favor, completa todos los campos.');
                return;
            }

            // Validar formato de email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showAlert('El formato del email no es válido.');
                return;
            }

            // Validar contraseña
            const passwordError = validatePassword(password);
            if (passwordError) {
                showAlert(passwordError);
                return;
            }

            // Verificar que las contraseñas coincidan
            if (password !== confirmPassword) {
                showAlert('Las contraseñas no coinciden.');
                return;
            }
            
            setLoading(true);
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, email, password }),
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('¡Usuario registrado exitosamente! Redirigiendo al login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showAlert(data.message || 'Error en el registro.');
                }
            } catch (error) {
                showAlert('Error de conexión. Intenta de nuevo.');
                console.error('Register error:', error);
            } finally {
                setLoading(false);
            }
        });

        function goToLogin() {
            window.location.href = '/';
        }

        // Validación en tiempo real de contraseña
        document.getElementById('password').addEventListener('input', (e) => {
            const password = e.target.value;
            const error = validatePassword(password);
            const input = e.target;
            
            if (password.length > 0 && error) {
                input.style.borderColor = '#d90429';
            } else if (password.length > 0) {
                input.style.borderColor = '#219653';
            } else {
                input.style.borderColor = '#d1d5db';
            }
        });

        // Validación de confirmación de contraseña
        document.getElementById('confirmPassword').addEventListener('input', (e) => {
            const password = document.getElementById('password').value;
            const confirmPassword = e.target.value;
            const input = e.target;
            
            if (confirmPassword.length > 0) {
                if (password === confirmPassword) {
                    input.style.borderColor = '#219653';
                } else {
                    input.style.borderColor = '#d90429';
                }
            } else {
                input.style.borderColor = '#d1d5db';
            }
        });
    </script>
</body>
</html>
