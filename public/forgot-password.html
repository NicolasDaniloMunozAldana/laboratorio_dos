<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - SIRA</title>
    <link rel="stylesheet" href="./styles/login.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>SIRA</h1>   
            <p>Recuperación de Contraseña</p>
        </div>
        
        <form class="login-form" id="forgotPasswordForm">
            <div id="alertContainer"></div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                Enviando código de recuperación...
            </div>
            
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" name="username" required placeholder="Ingrese su nombre de usuario">
                <small style="color: #666; font-size: 0.85rem; margin-top: 4px; display: block;">
                    Ingrese su nombre de usuario (no el email)
                </small>
            </div>
            
            <button type="submit" class="login-btn" id="submitBtn">
                Enviar Código de Recuperación
            </button>
            
            <div class="forgot-password">
                <a href="/" onclick="goBack()">← Volver al inicio de sesión</a>
            </div>
        </form>
    </div>

    <script>
        const forgotPasswordForm = document.getElementById('forgotPasswordForm');
        const submitBtn = document.getElementById('submitBtn');
        const loading = document.getElementById('loading');

        function showAlert(message, type = 'error') {
            let icon = 'error';
            if (type === 'success') icon = 'success';
            else if (type === 'warning') icon = 'warning';
            
            Swal.fire({
                text: message,
                icon: icon,
                confirmButtonColor: icon === 'success' ? '#2563eb' : (icon === 'warning' ? '#fb8500' : '#d90429'),
                timer: 5000,
                timerProgressBar: true,
                showConfirmButton: true
            });
        }

        function setLoading(isLoading) {
            if (isLoading) {
                loading.style.display = 'block';
                submitBtn.disabled = true;
                submitBtn.textContent = 'Enviando...';
            } else {
                loading.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enviar Código de Recuperación';
            }
        }

        forgotPasswordForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            
            if (!username) {
                showAlert('Por favor, ingresa tu nombre de usuario.');
                return;
            }
            
            setLoading(true);
            
            try {
                const response = await fetch('/api/auth/request-reset-code', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username }),
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('¡Código de recuperación enviado! Revisa tu email y serás redirigido a la página de recuperación.', 'success');
                    
                    // Guardar el username en localStorage para la siguiente página
                    localStorage.setItem('resetUsername', username);
                    
                    setTimeout(() => {
                        window.location.href = '/reset-password';
                    }, 2000);
                } else {
                    showAlert(data.message || 'Error al enviar el código de recuperación.');
                }
            } catch (error) {
                showAlert('Error de conexión. Intenta de nuevo.');
                console.error('Forgot password error:', error);
            } finally {
                setLoading(false);
            }
        });

        function goBack() {
            window.location.href = '/';
        }

        // Auto-completar para demo (opcional)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F1') {
                e.preventDefault();
                document.getElementById('username').value = 'admin';
            } else if (e.key === 'F2') {
                e.preventDefault();
                document.getElementById('username').value = 'nicolas';
            }
        });
    </script>
</body>
</html>
